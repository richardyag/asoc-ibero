<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión — Shito Ryu Itosu Kai</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .card { border-top: 4px solid #c0392b; }
  </style>
</head>
<body>
<div class="container" style="max-width:420px; margin-top:80px;">
  <div class="text-center mb-4">
    <img src="{{ url_for('static', filename='logo.jpg') }}" height="100" class="rounded-circle mb-3">
    <h5 class="fw-bold text-secondary">Asociación Iberoamericana</h5>
    <p class="text-muted small">"Shito Ryu Itosu Kai" de Karate y Kobudo</p>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h5 class="card-title mb-4">Iniciar sesión</h5>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" name="password" class="form-control" autofocus required>
        </div>
        <button type="submit" class="btn w-100" style="background:#c0392b;color:#fff;">
          Ingresar
        </button>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
