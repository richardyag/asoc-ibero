<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Asociación Iberoamericana Shito Ryu Itosu Kai{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root { --rojo: #c0392b; --rojo-dark: #96281b; }
    .navbar { background-color: var(--rojo) !important; }
    .navbar-brand, .nav-link { color: #fff !important; }
    .nav-link:hover { color: #ffd0cc !important; }
    .btn-primary { background-color: var(--rojo); border-color: var(--rojo); }
    .btn-primary:hover { background-color: var(--rojo-dark); border-color: var(--rojo-dark); }
    .badge-al-dia { background-color: #27ae60; }
    .badge-deuda-baja { background-color: #f39c12; }
    .badge-deuda-alta { background-color: var(--rojo); }
    .mes-pagado { background-color: #d5f5e3; color: #1e8449; border: 1px solid #a9dfbf; }
    .mes-pendiente { background-color: #fadbd8; color: #922b21; border: 1px solid #f1948a; }
    .mes-actual { background-color: #fef9e7; color: #7d6608; border: 1px solid #f9e79f; }
    .card-stat { border-left: 4px solid var(--rojo); }
    body { background-color: #f8f9fa; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{{ url_for('dashboard') }}">
      <img src="{{ url_for('static', filename='logo.jpg') }}" height="36" class="me-2 rounded-circle">
      Shito Ryu Itosu Kai
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navmenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('dashboard') }}">
            <i class="bi bi-speedometer2"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('socios_lista') }}">
            <i class="bi bi-people"></i> Socios
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('configuracion') }}">
            <i class="bi bi-gear"></i> Configuración
          </a>
        </li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('logout') }}">
            <i class="bi bi-box-arrow-right"></i> Salir
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4 mb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
